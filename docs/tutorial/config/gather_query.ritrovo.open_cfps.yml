query_id: ritrovo.open_cfps
label: Open CFPs
description: Conferences currently accepting talk proposals, sorted by deadline
definition:
  base_table: item
  fields: []
  filters:
  - exposed: false
    exposed_label: null
    field: fields.field_cfp_end_date
    operator: greater_or_equal
    value: current_date
  - exposed: false
    exposed_label: null
    field: fields.field_cfp_url
    operator: is_not_null
    value: null
  includes: {}
  item_type: conference
  relationships: []
  sorts:
  - direction: asc
    field: fields.field_cfp_end_date
    nulls: last
  stage_aware: true
display:
  canonical_url: /cfps
  empty_text: No open CFPs at this time.
  footer: null
  format: table
  header: null
  items_per_page: 20
  pager:
    enabled: true
    show_count: true
    style: full
plugin: ritrovo_importer
