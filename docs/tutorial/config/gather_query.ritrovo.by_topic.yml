query_id: ritrovo.by_topic
label: Conferences by Topic
description: Upcoming conferences filtered by topic UUID (includes sub-topics via recursive CTE)
definition:
  base_table: item
  fields: []
  filters:
  - exposed: false
    exposed_label: null
    field: fields.field_start_date
    operator: greater_or_equal
    value: current_date
  - exposed: false
    exposed_label: null
    field: fields.field_topics
    operator: has_tag_or_descendants
    value:
      url_arg: topic
  includes: {}
  item_type: conference
  relationships: []
  sorts:
  - direction: asc
    field: fields.field_start_date
    nulls: null
  stage_aware: true
display:
  canonical_url: null
  empty_text: No upcoming conferences found for this topic.
  footer: null
  format: table
  header: null
  items_per_page: 20
  pager:
    enabled: true
    show_count: true
    style: full
plugin: ritrovo_importer
