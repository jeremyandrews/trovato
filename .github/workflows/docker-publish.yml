name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Base version — bump minor for new feature cycles
  BASE_VERSION: "0.2"

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag listing

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Release tag: use the tag as-is
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # Nightly: auto-increment patch from latest tag
            LATEST=$(git tag -l "v${BASE_VERSION}.*" --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              NEXT="${BASE_VERSION}.0"
            else
              PATCH=$(echo "$LATEST" | sed "s/v${BASE_VERSION}\.\([0-9]*\).*/\1/")
              NEXT="${BASE_VERSION}.$((PATCH + 1))"
            fi
            echo "version=${NEXT}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi
          echo "Computed version: $(cat $GITHUB_OUTPUT | grep version)"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always tag with computed version
            type=raw,value=${{ steps.version.outputs.version }}
            # Pushes to main: also tag as "nightly" + short SHA
            type=raw,value=nightly,enable={{is_default_branch}}
            type=sha,prefix=nightly-,enable={{is_default_branch}}
            # Release tags: semver aliases + latest
            type=semver,pattern={{version}},enable=${{ steps.version.outputs.is_release }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release }}

      - name: Set up QEMU (for multi-platform release builds)
        if: steps.version.outputs.is_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Nightly: amd64 only (fast, ~12 minutes)
      # Release tags: amd64 + arm64 (slower but complete)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.version.outputs.is_release == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        timeout-minutes: 60
