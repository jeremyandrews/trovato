services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: trovato
      POSTGRES_PASSWORD: trovato
      POSTGRES_DB: trovato
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trovato"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Trovato runtime — only starts with: docker compose --profile full up
  # Pulls the nightly image by default; use --build for local compilation.
  # Mapped to port 3001 so it doesn't conflict with native dev server on 3000.
  trovato:
    profiles: ["full"]
    image: ghcr.io/jeremyandrews/trovato:nightly
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://trovato:trovato@postgres:5432/trovato
      REDIS_URL: redis://redis:6379
      DATABASE_MAX_CONNECTIONS: "10"
      RUST_LOG: info,tower_http=debug,sqlx=warn
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Trovato dev container — only starts with: docker compose --profile dev up
  # Provides full Rust toolchain for development without native Rust install.
  # Source code is mounted from host; edits are instant, builds use cached volumes.
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-dir:/workspace/target
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://trovato:trovato@postgres:5432/trovato
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,tower_http=debug,sqlx=warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    working_dir: /workspace

volumes:
  postgres_data:
  redis_data:
  cargo-registry:
  cargo-git:
  target-dir:
