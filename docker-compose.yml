services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: trovato
      POSTGRES_PASSWORD: trovato
      POSTGRES_DB: trovato
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trovato"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  trovato:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://trovato:trovato@postgres:5432/trovato
      REDIS_URL: redis://redis:6379
      DATABASE_MAX_CONNECTIONS: "10"
      RUST_LOG: info,tower_http=debug,sqlx=warn
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
