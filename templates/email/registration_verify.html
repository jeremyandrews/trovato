{% extends "email/base.html" %}
{% block content %}
<h2 style="margin: 0 0 15px; font-size: 18px; color: #1f2937;">Verify your account</h2>
<p style="color: #374151; line-height: 1.6;">Welcome to {{ site_name }}!</p>
<p style="color: #374151; line-height: 1.6;">To activate your account, click the button below:</p>
<p style="text-align: center; margin: 25px 0;">
<a href="{{ action_url }}" style="background-color: #4f46e5; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600;">Verify Email</a>
</p>
<p style="color: #6b7280; font-size: 13px;">Or copy this link: {{ action_url }}</p>
<p style="color: #6b7280; font-size: 13px;">This link expires in 24 hours.</p>
{% endblock %}
