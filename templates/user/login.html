{% extends "page.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-card__header">
            <h1 class="login-card__title">Welcome back</h1>
            <p class="login-card__subtitle">Sign in to your account</p>
        </div>

        {% if success %}
        <div class="message message--success" role="status">{{ success | escape }}</div>
        {% endif %}

        {% if error %}
        <div class="message message--error" role="status">{{ error | escape }}</div>
        {% endif %}

        <form method="post" action="/user/login" class="login-form">
            <input type="hidden" name="_token" value="{{ csrf_token }}">

            <div class="login-form__field">
                <label for="username" class="login-form__label">Username</label>
                <input type="text" id="username" name="username" class="login-form__input" required autofocus placeholder="Enter your username">
            </div>

            <div class="login-form__field">
                <label for="password" class="login-form__label">Password</label>
                <input type="password" id="password" name="password" class="login-form__input" required placeholder="Enter your password">
            </div>

            <div class="login-form__options">
                <label class="login-form__remember">
                    <input type="checkbox" name="remember_me" value="1">
                    <span>Remember me</span>
                </label>
                <a href="/user/password-reset" class="login-form__forgot">Forgot password?</a>
            </div>

            <button type="submit" class="login-form__submit">Sign in</button>
        </form>

        <div class="login-card__footer">
            Don't have an account? <a href="/user/register">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
