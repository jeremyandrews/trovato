<article class="item item--page">
    <header class="item__header">
        <h1 class="item__title">{{ item.title }}</h1>
    </header>

    <div class="item__content">
        <div class="page-hero">
            <h2>Get in touch</h2>
            <p>Have a question, want to suggest a conference, or interested in contributing? We would love to hear from you.</p>
        </div>

        <div class="contact-grid">
            <div class="contact-card">
                <div class="page-grid__icon page-grid__icon--indigo">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                </div>
                <h3>Email</h3>
                <p>admin@example.com</p>
            </div>
            <div class="contact-card">
                <div class="page-grid__icon page-grid__icon--teal">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>
                </div>
                <h3>Open Source</h3>
                <p>Contribute on GitHub</p>
            </div>
            <div class="contact-card">
                <div class="page-grid__icon page-grid__icon--amber">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <h3>Suggest a Conference</h3>
                <p>Know a conference we are missing? Let us know.</p>
            </div>
        </div>
    </div>
</article>
